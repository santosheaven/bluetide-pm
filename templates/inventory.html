{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Property Inventory</h2>
</div>

{% if properties %}
<div class="row">
    {% for property in properties %}
    <div class="col-md-6 mb-4">
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">
                    <i class="fas fa-building text-primary"></i> {{ property.name }}
                </h5>
                <p class="card-text">
                    <i class="fas fa-map-marker-alt"></i> {{ property.address }}
                </p>
                <div class="d-flex gap-2">
                    <a href="{{ url_for('property_spaces', property_id=property.id) }}" 
                       class="btn btn-primary btn-sm">
                        <i class="fas fa-door-open"></i> View Spaces
                    </a>
                </div>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% else %}
<div class="text-center">
    <div class="alert alert-info">
        <i class="fas fa-info-circle"></i> No properties found.
    </div>
</div>
{% endif %}
{% endblock %}
