{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Available Services</h2>
</div>

<div class="row">
    {% for service in services %}
    <div class="col-md-4 mb-4">
        <div class="card h-100">
            <div class="card-body">
                <h5 class="card-title">
                    <i class="fas fa-tools text-primary"></i> {{ service.name }}
                </h5>
                <p class="card-text">{{ service.description }}</p>
                <div class="d-flex justify-content-between align-items-center">
                    <span class="badge bg-secondary">{{ service.category }}</span>
                    <a href="{{ url_for('request_service_form', service_id=service.id) }}" 
                       class="btn btn-primary btn-sm">
                        <i class="fas fa-plus"></i> Request
                    </a>
                </div>
            </div>
        </div>
    </div>
    {% endfor %}
</div>

{% if not services %}
<div class="text-center">
    <div class="alert alert-info">
        <i class="fas fa-info-circle"></i> No services are currently available.
    </div>
</div>
{% endif %}
{% endblock %}
